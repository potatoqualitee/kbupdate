name: Quality gate

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PowerShell on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore PowerShell module cache
        uses: actions/cache@v4
        with:
          path: .artifacts/Modules
          key: powershell-${{ runner.os }}-${{ hashFiles('kbupdate.psd1', 'build/Invoke-KbUpdateQualityGate.ps1') }}

      - name: Run deterministic quality gate
        shell: pwsh
        run: ./build/Invoke-KbUpdateQualityGate.ps1 -Bootstrap

  cloudflare-scheduler:
    name: Cloudflare scheduler
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/kbupdate-library-scheduler

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/kbupdate-library-scheduler/package-lock.json

      - name: Install pinned dependencies
        run: npm ci

      - name: Typecheck and test scheduler
        run: npm run check

      - name: Validate Worker bundle
        run: npm run deploy:dry-run
